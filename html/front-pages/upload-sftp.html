<!DOCTYPE html>
<html lang="en" class="layout-navbar-fixed layout-wide" dir="ltr" data-assets-path="../../assets/"
  data-template="front-pages" data-bs-theme="light">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Create Project via SFTP | 3DHub Data Portal</title>
  <link rel="icon" type="image/x-icon" href="../../assets/img/favicon/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&amp;display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="../../assets/vendor/fonts/iconify-icons.css">
  <link rel="stylesheet" href="../../assets/vendor/css/core.css">
  <link rel="stylesheet" href="../../assets/css/demo.css">
  <link rel="stylesheet" href="../../assets/css/client-responsive.css">
  <link rel="stylesheet" href="../../assets/vendor/css/pages/front-page.css">

  <!-- Leaflet CSS & JS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <script src="../../assets/vendor/js/helpers.js"></script>
  <script src="../../assets/js/front-config.js"></script>
  <script>
    (function () {
      var AUTH_API = (window.TemaDataPortal_API_BASE || window.location.origin || 'http://localhost:3000');
      var LANDING_URL = (window.location.origin || 'http://localhost:3000') + '/html/front-pages/landing-page.html';
      fetch(AUTH_API + '/api/auth/me', { credentials: 'include' }).then(function (r) { return r.json(); }).then(function (d) {
        if (!d.loggedIn) {
          window.location.href = '/html/front-pages/login.html?redirect=' + encodeURIComponent(window.location.pathname);
          return;
        }
        if (d.role !== 'subscriber' && d.role !== 'admin') {
          window.location.href = (window.location.origin || 'http://localhost:3000') + '/html/front-pages/landing-page.html?message=subscriber_required';
        }
      }).catch(function () { });
    })();
  </script>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    .split-layout {
      height: 100vh;
      width: 100vw;
      position: relative;
    }

    .right-panel {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 1;
    }

    .left-panel {
      position: absolute;
      top: 24px;
      left: 24px;
      width: 580px;
      height: calc(100vh - 48px);
      display: flex;
      flex-direction: column;
      background: rgba(255, 255, 255, 0.90);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 10;
      border-radius: 16px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15), 0 1px 3px rgba(0, 0, 0, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.5);
      overflow: hidden;
    }

    .left-header {
      padding: 1.5rem 1.75rem;
      border-bottom: 1px solid rgba(0, 0, 0, 0.05);
      background: rgba(255, 255, 255, 0.5);
    }

    .left-content {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem 1.75rem;
      scrollbar-width: thin;
      scrollbar-color: #d1d5db transparent;
    }

    .left-footer {
      padding: 1.25rem 1.75rem;
      border-top: 1px solid rgba(0, 0, 0, 0.05);
      background: rgba(255, 255, 255, 0.5);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .form-section-title {
      font-size: 0.8rem;
      font-weight: 700;
      color: #697a8d;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 1.25rem;
      margin-top: 2rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .form-section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(0, 0, 0, 0.05);
    }

    .sftp-fields-card {
      background: #f8f9fa;
      border: 1px solid #ebedf2;
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    #mapPicker {
      height: 100%;
      width: 100%;
      z-index: 1;
    }
  </style>
</head>

<body>
  <div class="split-layout">
    <div class="left-panel">
      <div class="left-header">
        <h4 class="mb-1 fw-bold">Create Project using SFTP</h4>
        <p class="text-muted small mb-0">Enter your SFTP details for automated data fetching.</p>
      </div>
      <div class="left-content">
        <form id="sftpForm" novalidate>
          <div class="form-section-title mt-0">SFTP Credentials</div>
          <div class="sftp-fields-card">
            <div class="row g-3">
              <div class="col-md-9">
                <label class="form-label" for="sftpHost">Host / IP Address <span class="text-danger">*</span></label>
                <input type="text" id="sftpHost" class="form-control" placeholder="e.g. sftp.yourserver.com" required>
              </div>
              <div class="col-md-3">
                <label class="form-label" for="sftpPort">Port <span class="text-danger">*</span></label>
                <input type="number" id="sftpPort" class="form-control" value="22" required>
              </div>
              <div class="col-md-6">
                <label class="form-label" for="sftpUsername">Username <span class="text-danger">*</span></label>
                <input type="text" id="sftpUsername" class="form-control" placeholder="Username" required>
              </div>
              <div class="col-md-6">
                <label class="form-label" for="sftpPassword">Password <span class="text-danger">*</span></label>
                <input type="password" id="sftpPassword" class="form-control" placeholder="••••••••" required>
              </div>
              <div class="col-12">
                <label class="form-label" for="sftpRemotePath">Remote Project Path <span class="text-danger">*</span></label>
                <input type="text" id="sftpRemotePath" class="form-control" placeholder="/home/user/drone_project_a/" required>
                <small class="text-muted">The absolute path where your photos are stored.</small>
              </div>
              <div class="col-12 mt-4 text-center">
                <button type="button" id="btnTestConnection" class="btn btn-outline-info w-100">
                  <i class="bx bx-podcast me-1"></i> Test Connection
                </button>
              </div>
            </div>
          </div>

          <div class="form-section-title">Project Details</div>
          <div class="mb-3">
            <label class="form-label" for="projectTitle">Project Title <span class="text-danger">*</span></label>
            <input type="text" id="projectTitle" class="form-control" placeholder="e.g., Riverside Survey A" required>
          </div>
          <div class="mb-3">
            <label class="form-label" for="projectDescription">Project Description</label>
            <textarea id="projectDescription" class="form-control" rows="3" placeholder="Describe the survey area or purpose..."></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label" for="category">Category</label>
            <select id="category" class="form-select">
              <option value="Survey">Survey</option>
              <option value="Construction">Construction</option>
              <option value="Agriculture">Agriculture</option>
              <option value="Inspection">Inspection</option>
              <option value="Other">Other</option>
            </select>
          </div>

          <div class="form-section-title">Location Selection</div>
          <p class="text-muted small mb-3">Pick the center point of the survey area on the map.</p>
          <div style="height: 200px; border-radius: 12px; overflow: hidden; border: 1px solid #ebedf2; margin-bottom: 2rem;">
             <div id="miniMapPicker" style="height: 100%;"></div>
          </div>
          <input type="hidden" id="latitude" required>
          <input type="hidden" id="longitude" required>
        </form>
      </div>
      <div class="left-footer">
        <button type="button" class="btn btn-label-secondary" onclick="window.location.href='create-project.html'">Cancel</button>
        <button type="submit" form="sftpForm" class="btn btn-primary px-5">Submit Project</button>
      </div>
    </div>
    <div class="right-panel">
      <div id="mapPicker"></div>
    </div>
  </div>

  <script src="../../assets/vendor/libs/jquery/jquery.js"></script>
  <script src="../../assets/vendor/libs/popper/popper.js"></script>
  <script src="../../assets/vendor/js/bootstrap.js"></script>
  <script>
    var map = L.map('mapPicker', { zoomControl: false }).setView([5.9804, 116.0735], 13);
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
      attribution: 'Tiles &copy; Esri',
      maxZoom: 19
    }).addTo(map);
    L.control.zoom({ position: 'bottomright' }).addTo(map);

    var marker = null;
    map.on('click', function(e) {
      if (marker) map.removeLayer(marker);
      marker = L.marker(e.latlng).addTo(map);
      document.getElementById('latitude').value = e.latlng.lat.toFixed(6);
      document.getElementById('longitude').value = e.latlng.lng.toFixed(6);
    });

    document.getElementById('btnTestConnection').addEventListener('click', async function() {
      const btn = this;
      const originalHtml = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Testing...';

      const payload = {
        host: document.getElementById('sftpHost').value,
        port: document.getElementById('sftpPort').value,
        username: document.getElementById('sftpUsername').value,
        password: document.getElementById('sftpPassword').value
      };

      try {
        const res = await fetch('/api/upload/test-sftp', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (data.success) {
          alert('✓ Connection Successful!');
          btn.innerHTML = '<i class="bx bx-check me-1"></i> Connected';
          btn.className = 'btn btn-success w-100';
        } else {
          alert('✗ Connection Failed: ' + data.message);
          btn.disabled = false;
          btn.innerHTML = originalHtml;
        }
      } catch (e) {
        alert('Error testing connection.');
        btn.disabled = false;
        btn.innerHTML = originalHtml;
      }
    });

    document.getElementById('sftpForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      if (!document.getElementById('latitude').value) {
        alert('Please pick a location on the map.');
        return;
      }
      
      const payload = {
        type: 'sftp',
        projectTitle: document.getElementById('projectTitle').value,
        projectDescription: document.getElementById('projectDescription').value,
        category: document.getElementById('category').value,
        latitude: document.getElementById('latitude').value,
        longitude: document.getElementById('longitude').value,
        sftpDetails: {
          host: document.getElementById('sftpHost').value,
          port: document.getElementById('sftpPort').value,
          username: document.getElementById('sftpUsername').value,
          password: document.getElementById('sftpPassword').value,
          remotePath: document.getElementById('sftpRemotePath').value
        }
      };

      try {
        const res = await fetch('/api/upload/sftp-project', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (data.success) {
          alert('Project created successfully!');
          window.location.href = 'my-uploads.html';
        } else {
          alert('Error: ' + data.message);
        }
      } catch (err) {
        alert('Server error.');
      }
    });
  </script>
</body>

</html>
